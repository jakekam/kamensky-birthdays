    var orig = Element.prototype.attachShadow;
    Element.prototype.attachShadow = function (init) {
      return orig.call(this, Object.assign({}, init, { mode: "open" }));

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:#FBF4E9; font-family:'Figtree',system-ui,sans-serif; color:#33281F; padding:40px 20px; display:flex; justify-content:center; align-items:flex-start;\">\n  <div style=\"width:100%; max-width:660px;\">\n\n    <!-- ============ SCREEN 1: SELECT PERSON ============ -->\n    <sc-if value=\"{{ isSelect }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:floatUp .45s ease both;\">\n      <div style=\"text-align:center; margin-bottom:34px;\">\n        <div style=\"font-size:46px; line-height:1; margin-bottom:14px;\">🎂<\u002Fdiv>\n        <h1 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:38px; line-height:1.05; margin:0 0 12px; letter-spacing:-0.02em;\">Hi, Kamensky crew!<\u002Fh1>\n        <p style=\"margin:0 auto; max-width:440px; font-size:17px; line-height:1.5; color:#8A7A68;\">Tap your name so we can <em>finally<\u002Fem> stop pretending we remembered your birthday.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:12px;\">\n        <sc-for list=\"{{ people }}\" as=\"p\" hint-placeholder-count=\"12\">\n          <button onclick=\"{{ p.onSelect }}\" style=\"display:flex; align-items:center; gap:14px; text-align:left; background:#FFFDF9; border:1.5px solid #EADFCF; border-radius:16px; padding:14px 16px; cursor:pointer; font-family:inherit; transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;\" style-hover=\"border-color:#E7643C; transform:translateY(-2px); box-shadow:0 8px 20px -10px rgba(231,100,60,0.5);\">\n            <span style=\"flex:none; width:44px; height:44px; border-radius:50%; background:{{ p.color }}; color:#fff; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:19px; display:flex; align-items:center; justify-content:center;\">{{ p.initial }}<\u002Fspan>\n            <span style=\"display:flex; flex-direction:column; min-width:0;\">\n              <span style=\"font-weight:700; font-size:17px; color:#33281F;\">{{ p.name }}<\u002Fspan>\n              <span style=\"font-size:13px; color:#A79683; font-weight:500;\">{{ p.badge }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ ENTRY SCREEN (own birthday + family) ============ -->\n    <sc-if value=\"{{ isEntry }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:floatUp .45s ease both;\">\n      <button onclick=\"{{ onBack }}\" style=\"background:none; border:none; color:#A79683; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; padding:6px 0; margin-bottom:18px;\">← back<\u002Fbutton>\n      <div style=\"margin-bottom:22px;\">\n        <h1 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:30px; margin:0 0 8px; letter-spacing:-0.02em;\">{{ entryTitle }}<\u002Fh1>\n        <p style=\"margin:0; color:#8A7A68; font-size:16px; line-height:1.45;\">{{ entrySub }}<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ dateFields }}\" as=\"f\" hint-placeholder-count=\"1\">\n        <div style=\"background:#FFFDF9; border:1.5px solid #EADFCF; border-radius:18px; padding:18px 20px; margin-bottom:14px;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:16px;\">\n            <span style=\"flex:none; width:40px; height:40px; border-radius:50%; background:{{ f.color }}; color:#fff; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:17px; display:flex; align-items:center; justify-content:center;\">{{ f.initial }}<\u002Fspan>\n            <div style=\"display:flex; flex-direction:column;\">\n              <span style=\"font-weight:700; font-size:18px;\">{{ f.label }}<\u002Fspan>\n              <span style=\"font-size:12px; color:#A79683; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;\">{{ f.sub }}<\u002Fspan>\n px; accent-color:#E7643C; cursor:pointer;\">\n                  Not sure\n                <\u002Flabel>\n              <\u002Fdiv>\n              <sc-if value=\"{{ f.hebActive }}\" hint-placeholder-val=\"{{ true }}\">\n              <div dir=\"rtl\" style=\"display:flex; gap:8px;\">\n                <select name=\"{{ f.heb.nameM }}\" value=\"{{ f.heb.m }}\" onchange=\"{{ f.heb.onMonth }}\" style=\"flex:1.5; font-family:'Frank Ruhl Libre',serif; -webkit-appearance:none; appearance:none; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 stroke=%22%238A7A68%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/&gt;&lt;/svg&gt;') no-repeat left 10px center; border:1.5px solid #E4D5BC; border-radius:10px; padding:11px 12px 11px 26px; font-size:16px; font-weight:600; color:#33281F; cursor:pointer;\">\n                  <option value=\"\">חודש<\u002Foption>\n                  <sc-for list=\"{{ hebMonths }}\" as=\"hm\"><option value=\"{{ hm.v }}\">{{ hm.name }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n                <select name=\"{{ f.heb.nameD }}\" value=\"{{ f.heb.d }}\" onchange=\"{{ f.heb.onDay }}\" style=\"flex:1; font-family:'Frank Ruhl Libre',serif; -webkit-appearance:none; appearance:none; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 stroke=%22%238A7A68%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/&gt;&lt;/svg&gt;') no-repeat left 10px center; border:1.5px solid #E4D5BC; border-radius:10px; padding:11px 12px 11px 26px; font-size:16px; font-weight:600; color:#33281F; cursor:pointer;\">\n                  <option value=\"\">יום<\u002Foption>\n                  <sc-for list=\"{{ hebDays }}\" as=\"hd\"><option value=\"{{ hd.v }}\">{{ hd.name }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- English (right): month + day -->\n            <div style=\"flex:1; background:#F7F1E6; border-radius:14px; padding:14px;\">\n              <div style=\"display:flex; align-items:center; min-height:22px; margin-bottom:10px;\">\n                <span style=\"font-weight:700; font-size:16px; color:#8A7A68;\">English<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:8px;\">\n                <select name=\"{{ f.eng.nameM }}\" value=\"{{ f.eng.m }}\" onchange=\"{{ f.eng.onMonth }}\" style=\"flex:1.5; -webkit-appearance:none; appearance:none; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 stroke=%22%238A7A68%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/&gt;&lt;/svg&gt;') no-repeat right 10px center; border:1.5px solid #EADFCF; border-radius:10px; padding:11px 26px 11px 12px; font-family:inherit; font-size:15px; font-weight:600; color:#33281F; cursor:pointer;\">\n                  <option value=\"\">Month<\u002Foption>\n                  <sc-for list=\"{{ months }}\" as=\"mo\"><option value=\"{{ mo.num }}\">{{ mo.name }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n                <select name=\"{{ f.eng.nameD }}\" value=\"{{ f.eng.d }}\" onchange=\"{{ f.eng.onDay }}\" style=\"flex:1; -webkit-appearance:none; appearance:none; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 stroke=%22%238A7A68%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/&gt;&lt;/svg&gt;') no-repeat right 10px center; border:1.5px solid #EADFCF; border-radius:10px; padding:11px 26px 11px 12px; font-family:inherit; font-size:15px; font-weight:600; color:#33281F; cursor:pointer;\">\n                  <option value=\"\">Day<\u002Foption>\n                  <sc-for list=\"{{ days }}\" as=\"dd\"><option value=\"{{ dd }}\">{{ dd }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"color:#C0472A; font-size:15px; font-weight:600; margin:4px 2px 14px;\">{{ error }}<\u002Fp>\n      <\u002Fsc-if>\n\n      <button onclick=\"{{ onSubmit }}\" style=\"width:100%; background:#E7643C; color:#fff; border:none; border-radius:14px; padding:17px; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:18px; cursor:pointer; margin-top:8px; transition:background .12s ease;\" style-hover=\"background:#Cf5330;\">{{ submitLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DONE + DAD JOKE ============ -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"text-align:center; animation:floatUp .5s ease both; padding-top:20px;\">\n      <div style=\"width:88px; height:88px; border-radius:50%; background:#5C9A6B; color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; font-size:44px; animation:pop .5s ease both;\">✓<\u002Fdiv>\n      <h1 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:36px; margin:0 0 10px; letter-spacing:-0.02em;\">Thanks, {{ selName }}! 🎉<\u002Fh1>\n      <p style=\"margin:0 auto 30px; max-width:400px; color:#8A7A68; font-size:17px; line-height:1.5;\">All locked in — English <em>and<\u002Fem> Hebrew. Get ready for the happy birthdays!<\u002Fp>\n      <div style=\"background:#FFFDF9; border:1.5px solid #EADFCF; border-radius:20px; padding:26px 24px; max-width:460px; margin:0 auto 28px; text-align:left;\">\n        <div style=\"font-size:13px; font-weight:700; color:#E7643C; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">Your reward: a dad joke 🥁<\u002Fdiv>\n        <p style=\"margin:0; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:21px; line-height:1.35;\">{{ joke }}<\u002Fp>\n      <\u002Fdiv>\n      <button onclick=\"{{ restart }}\" style=\"background:none; border:1.5px solid #EADFCF; color:#8A7A68; border-radius:12px; padding:12px 24px; font-family:inherit; font-weight:700; font-size:15px; cursor:pointer;\" style-hover=\"border-color:#E7643C; color:#E7643C;\">Someone else's turn →<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const COLORS = ['#E7643C','#E9A23B','#5C9A6B','#4E88C7','#B15FA8','#D98A5B','#5FA8A0','#C7607A','#8C7BD8','#D9954B'];\n    this.COLORS = COLORS;\n    this.FAMILY = [\n      { id:'ta', name:'Ta Kamensky', badge:'Dad' },\n      { id:'mom', name:'Mom Kamensky', badge:'Mom' },\n      { id:'chana', name:'Chana', badge:'Sibling', spouse:'Shmaya', kids:['Mushka','Mendel','Yossi','Sholom','Menucha','Shaina','Sarale','Zalman','Rivkah','Shmuli'] },\n      { id:'chaya', name:'Chaya', badge:'Sibling', kids:['Moussia','Menachem','Sholom'] },\n      { id:'rivkah', name:'Rivkah', badge:'Sibling', spouse:'Simon', kids:['Elijah','Ahava','Rafa'] },\n      { id:'schneur', name:'Schneur', badge:'Sibling', spouse:'Sonya', kids:['Tehila','Menucha','Benny','Ari','Yehuda','Sholom'] },\n      { id:'moussia', name:'Moussia', badge:'Sibling', spouse:'Gavi', kids:['Aria','Bella','Zane','Luna'] },\n      { id:'charna', name:'Charna', badge:'Sibling' },\n      { id:'shmuel', name:'Shmuel', badge:'Sibling', spouse:'Roni', kids:['Ofer'] },\n      { id:'yaakov', name:'Yaakov', badge:'Sibling' },\n      { id:'chezky', name:'Chezky', badge:'Sibling' },\n      { id:'shaina', name:'Shaina', badge:'Sibling', spouse:'Moshe' },\n    ];\n    this.JOKES = [\n      \"Why couldn't the bicycle sing happy birthday? It was two-tired.\",\n      \"Why did the birthday cake go to the doctor? It was feeling a little crumby.\",\n      \"I wanted to throw the calendar a party, but its days are numbered.\",\n      \"What do you give a cow on its birthday? A moo-sical card.\",\n      \"What's the best birthday present ever? A broken drum — you just can't beat it.\",\n      \"Why did the birthday balloon feel so down? It just couldn't handle the pressure.\",\n      \"How many candles go on grandpa's cake? Nobody knows — the fire marshal won't allow it.\",\n      \"What did one candle say to the other? Don't birthdays just burn you out?\",\n    ];\n    this.state = {\n      step: 'select',\n      selectedId: null,\n      dates: {},\n      error: '',\n      joke: this.JOKES[0],\n    };\n  }\n\n  gematria(n) {\n    const H = [[400,'ת'],[300,'ש'],[200,'ר'],[100,'ק']];\n    const T = [[90,'צ'],[80,'פ'],[70,'ע'],[60,'ס'],[50,'נ'],[40,'מ'],[30,'ל'],[20,'כ'],[10,'י']];\n    const O = [[9,'ט'],[8,'ח'],[7,'ז'],[6,'ו'],[5,'ה'],[4,'ד'],[3,'ג'],[2,'ב'],[1,'א']];\n    let out = '';\n    for (const [v, l] of H) { while (n >= v) { out += l; n -= v; } }\n    if (n === 15) return out + 'טו';\n    if (n === 16) return out + 'טז';\n    for (const [v, l] of T) { if (n >= v) { out += l; n -= v; break; } }\n    for (const [v, l] of O) { if (n >= v) { out += l; n -= v; break; } }\n    return out;\n  }\n  yearGematria(fullYear) {\n    const s = this.gematria(fullYear - 5000);\n    if (s.length < 2) return s + '״';\n    return s.slice(0, -1) + '״' + s.slice(-1);\n  }\n\n  selectPerson(id) { this.setState({ selectedId: id, step: 'myBirthday', error: '' }); }\n  back() { this.setState({ step: 'select', error: '' }); }\n  backToMine() { this.setState({ step: 'myBirthday', error: '' }); }\n  pickJoke() { return this.JOKES[Math.floor(Math.random() * this.JOKES.length)]; }\n  restart() { this.setState({ step: 'select', selectedId: null, dates: {}, error: '' }); }\n\n  setDate(key, cal, part, val) {\n    this.setState(s => {\n      const cur = s.dates[key] || {};\n      return { dates: { ...s.dates, [key]: { ...cur, [cal]: { ...(cur[cal] || {}), [part]: val } } }, error: '' };\n    });\n  }\n  toggleNS(key) {\n    this.setState(s => {\n      const cur = s.dates[key] || {};\n      return { dates: { ...s.dates, [key]: { ...cur, hebNS: !cur.hebNS } }, error: '' };\n    });\n  }\n\n  person() { return this.FAMILY.find(p => p.id === this.state.selectedId); }\n  hasFamily(p) { return !!(p && (p.spouse || (p.kids && p.kids.length))); }\n\n  completeSubject(key) {\n    const d = this.state.dates[key] || {};\n    const eng = d.eng || {};\n    const heb = d.heb || {};\n    const yearOk = !!d.year;\n    const engOk = eng.m && eng.d;\n    const hebOk = d.hebNS || (heb.m && heb.d);\n    return yearOk && engOk && hebOk;\n  }\n\n  submitSelf() {\n    const p = this.person();\n    if (!this.completeSubject('self')) { this.setState({ error: 'Fill in your English birthday (and Hebrew, or check \"Not sure\"). 🎈' }); return; }\n    if (this.hasFamily(p)) this.setState({ step: 'family', error: '' });\n    else this.setState({ step: 'done', error: '', joke: this.pickJoke() });\n  }\n  submitFamily() {\n    const defs = this.familyFieldDefs();\n    if (defs.some(d => !this.completeSubject(d.key))) { this.setState({ error: 'Each person needs an English birthday (and Hebrew, unless \"Not sure\" is checked).' }); return; }\n    this.setState({ step: 'done', error: '', joke: this.pickJoke() });\n  }\n\n  familyFieldDefs() {\n    const p = this.person();\n    if (!p) return [];\n    const defs = [];\n    if (p.spouse) defs.push({ key: 'spouse', name: p.spouse, sub: 'Spouse' });\n    (p.kids || []).forEach((k, i) => defs.push({ key: 'kid' + i, name: k, sub: 'Kid' }));\n    return defs;\n  }\n\n  setYear(key, val) {\n    this.setState(s => ({ dates: { ...s.dates, [key]: { ...(s.dates[key] || {}), year: val } }, error: '' }));\n  }\n\n  makeField(key, label, sub, initial, color) {\n    const d = this.state.dates[key] || {};\n    const eng = d.eng || {};\n    const heb = d.heb || {};\n    const nm = (cal, p) => this.state.selectedId + '_' + key + '_' + cal + '_' + p;\n    return {\n      key, label, sub, initial, color,\n      year: d.year || '',\n      nameY: this.state.selectedId + '_' + key + '_year',\n      onYear: e => this.setYear(key, e.target.value),\n      hebActive: !d.hebNS,\n      eng: {\n        m: eng.m || '', d: eng.d || '',\n        nameM: nm('eng', 'month'), nameD: nm('eng', 'day'),\n        onMonth: e => this.setDate(key, 'eng', 'm', e.target.value),\n        onDay: e => this.setDate(key, 'eng', 'd', e.target.value),\n      },\n      heb: {\n        m: heb.m || '', d: heb.d || '', notSure: !!d.hebNS,\n        nameM: nm('heb', 'month'), nameD: nm('heb', 'day'), nameNS: this.state.selectedId + '_' + key + '_heb_notsure',\n        onMonth: e => this.setDate(key, 'heb', 'm', e.target.value),\n        onDay: e => this.setDate(key, 'heb', 'd', e.target.value),\n        onNotSure: () => this.toggleNS(key),\n      },\n    };\n  }\n\n  renderVals() {\n    const months = ['January','February','March','April','May','June','July','August','September','October','November','December']\n      .map((name, i) => ({ num: String(i + 1).padStart(2, '0'), name }));\n    const days = Array.from({ length: 31 }, (_, i) => String(i + 1));\n    const years = [];\n    for (let y = 2026; y >= 1930; y--) years.push(String(y));\n\n    const hebMonths = [\n      { v:'tishrei', name:'תשרי' }, { v:'cheshvan', name:'חשון' }, { v:'kislev', name:'כסלו' },\n      { v:'tevet', name:'טבת' }, { v:'shevat', name:'שבט' }, { v:'adar', name:'אדר' },\n      { v:'adar1', name:'אדר א׳' }, { v:'adar2', name:'אדר ב׳' }, { v:'nisan', name:'ניסן' },\n      { v:'iyar', name:'אייר' }, { v:'sivan', name:'סיון' }, { v:'tammuz', name:'תמוז' },\n      { v:'av', name:'אב' }, { v:'elul', name:'אלול' },\n    ];\n    const hebDays = Array.from({ length: 30 }, (_, i) => ({ v: String(i + 1), name: this.gematria(i + 1) }));\n\n    const step = this.state.step;\n    const p = this.person();\n    const idx = p ? this.FAMILY.findIndex(x => x.id === p.id) : 0;\n    const selColor = this.COLORS[idx % this.COLORS.length];\n\n    const isMine = step === 'myBirthday';\n    const isFamily = step === 'family';\n\n    let dateFields = [];\n    if (isMine && p) {\n      dateFields = [this.makeField('self', p.name, 'You', p.name.trim()[0], selColor)];\n    } else if (isFamily) {\n      dateFields = this.familyFieldDefs().map((def, i) =>\n        this.makeField(def.key, def.name, def.sub, def.name.trim()[0], this.COLORS[(idx + i + 1) % this.COLORS.length])\n      );\n    }\n\n    return {\n      isSelect: step === 'select',\n      isEntry: isMine || isFamily,\n      isDone: step === 'done',\n      people: this.FAMILY.map((x, i) => ({\n        ...x, initial: x.name.trim()[0], color: this.COLORS[i % this.COLORS.length],\n        onSelect: () => this.selectPerson(x.id),\n      })),\n      selName: p ? p.name : '',\n      entryTitle: isMine ? (p ? 'Hey ' + p.name + '!' : '') : (p ? \"The rest of \" + p.name + \"'s crew\" : ''),\n      entrySub: isMine\n        ? 'When’s the big day? Add both your English and Hebrew birthdays. 🎈'\n        : \"Birthdays for everyone under your roof — English and Hebrew. No pressure, but they’ll know if you forget. 👀\",\n      onBack: isMine ? (() => this.back()) : (() => this.backToMine()),\n      onSubmit: isMine ? (() => this.submitSelf()) : (() => this.submitFamily()),\n      submitLabel: isMine ? (this.hasFamily(p) ? 'Next: my family →' : 'Save my birthday →') : \"Save everyone's birthdays 🎂\",\n      dateFields, months, days, years, hebMonths, hebDays,\n      error: this.state.error,\n      joke: this.state.joke,\n      restart: () => this.restart(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>

(function () {

    rivkah:"Rivkah", schneur:"Schneur", moussia:"Moussia", charna:"Charna",
    shmuel:"Shmuel", yaakov:"Yaakov", chezky:"Chezky", shaina:"Shaina" };
  var CAPTURED = {};

  // shadow-DOM-safe helpers
  function deepAll(sel, root) {
    root = root || document;
    var out = Array.prototype.slice.call(root.querySelectorAll(sel));
    Array.prototype.forEach.call(root.querySelectorAll("*"), function (el) {
      if (el.shadowRoot) out = out.concat(deepAll(sel, el.shadowRoot));
    });
    return out;
  }
  function deepText() {
    var t = document.body ? (document.body.innerText || "") : "";
    deepAll("*").forEach(function (el) {
      if (el.shadowRoot) t += " " + (el.shadowRoot.textContent || "");
    });
    return t;
  }
  function grab(el) {
    if (!el || !el.name) return;
    if (el.type === "checkbox") CAPTURED[el.name] = el.checked ? "true" : "false";
    else if (el.value !== "") CAPTURED[el.name] = el.value;
  }

  document.addEventListener("change", function (e) { grab(e.target); }, true);
  document.addEventListener("input", function (e) { grab(e.target); }, true);

  function selectedId() {

    body.push("source=" + encodeURIComponent("Family Birthday Form"));
    fetch(WEBHOOK_URL, {

      body: body.join("&")
    }).catch(function (err) { console.error("GHL post failed", err); posted = false; });
  }

  setInterval(function () {

  }, 400);
})();
